name              = "brainsait-portals"
main              = "src/brainsait-rag.js"
compatibility_date  = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
account_id        = "d7b99530559ab4f2545e9bdc72a7ab9b"

# ── Public route ────────────────────────────────────────────────────────────
[[routes]]
pattern   = "brainsait-portals.elfadil.com/*"
zone_name = "elfadil.com"

# ── R2 Bucket: BrainSAIT Documents ─────────────────────────────────────────
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "brainsait-documents"

# ── KV: Search Results Cache ───────────────────────────────────────────────
# Create with: wrangler kv namespace create "SEARCH_CACHE"
[[kv_namespaces]]
binding = "SEARCH_CACHE"
id      = "YOUR_KV_NAMESPACE_ID"  # Update after creating

# ── Secrets (set via CLI) ──────────────────────────────────────────────────
#   wrangler secret put OPENAI_API_KEY  # For AI Gateway
#   wrangler secret put API_KEY         # For upload endpoint

# ── Environment Variables ──────────────────────────────────────────────────
[vars]
PORTALS_URL = "https://brainsait-portals.elfadil.com"
