protocol: quic
metrics: 127.0.0.1:20241

# Global defaults — all oracle routes inherit these
originRequest:
  connectTimeout: 30s
  tcpKeepAlive: 30s
  keepAliveConnections: 10
  keepAliveTimeout: 90s
  noTLSVerify: false
  http2Origin: false          # Oracle JSF 11g/12c incompatible with HTTP/2

ingress:

