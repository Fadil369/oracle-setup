name = "brainsait-portals"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"

# Serve on portals.elfadil.com
[[routes]]
pattern = "portals.elfadil.com/*"
zone_name = "elfadil.com"

# Health cache KV (optional — cron degrades gracefully if not set)
# Create:  wrangler kv namespace create "PORTAL_HEALTH"
# Then replace the id below with the output ID before deploying.
[[kv_namespaces]]
binding = "PORTAL_KV"
id      = "079016c359c348e180724cdd76f29129"

# Cron: probe all branches every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Observability (Workers Tail / Logpush)
[observability]
enabled = true

# Secrets:
#   wrangler secret put API_KEY    ← protects /api/control-tower and /api/scan/:branch
#   wrangler secret put CF_ACCESS_JWT_PUBLIC_KEY
#   wrangler secret put CF_ACCESS_AUD
# Optional vars for automatic key rotation:
#   CF_ACCESS_CERTS_URL = "https://<team>.cloudflareaccess.com/cdn-cgi/access/certs"
#   CF_ACCESS_TEAM_DOMAIN = "<team>.cloudflareaccess.com"
[vars]
SCANNER_URL = "https://oracle-scanner.elfadil.com"
ALLOW_UNAUTHENTICATED = "0"
REQUIRE_CF_ACCESS = "0"
CORS_ALLOWED_ORIGINS = "https://portals.elfadil.com"
CF_ACCESS_TEAM_DOMAIN = ""
REPO_URL = "https://github.com/Fadil369/oracle-setup"
REPO_OWNER = "Fadil369"
REPO_NAME = "oracle-setup"
REPO_BRANCH = "main"

[[services]]
binding = "SCANNER_SERVICE"
service = "oracle-claim-scanner"
