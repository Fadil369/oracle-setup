name = "brainsait-portals"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"

workers_dev = true

routes = [
  { pattern = "portal.brainsait.org/*", zone_id = "117f23e28c474f87e9984bc4b6753a1b" },
  { pattern = "portals.brainsait.org/*", zone_id = "117f23e28c474f87e9984bc4b6753a1b" }
]

# Health cache KV
[[kv_namespaces]]
binding = "PORTAL_KV"
id      = "079016c359c348e180724cdd76f29129"

# Cron: probe all branches every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Observability (Workers Tail / Logpush)
[observability]
enabled = true

# Secrets:
#   wrangler secret put API_KEY    ← protects /api/control-tower and authenticated /api/scan/:branch
#   wrangler secret put CF_ACCESS_JWT_PUBLIC_KEY
#   wrangler secret put CF_ACCESS_AUD
# Optional vars for automatic key rotation:
#   CF_ACCESS_CERTS_URL = "https://<team>.cloudflareaccess.com/cdn-cgi/access/certs"
#   CF_ACCESS_TEAM_DOMAIN = "<team>.cloudflareaccess.com"
[vars]
SCANNER_URL = "https://oracle-scanner.brainsait.org"
ALLOW_UNAUTHENTICATED = "0"
REQUIRE_CF_ACCESS = "0"
CORS_ALLOWED_ORIGINS = "https://portal.brainsait.org,https://portals.brainsait.org,https://portals.elfadil.com"
CF_ACCESS_TEAM_DOMAIN = ""
REPO_URL = "https://github.com/Fadil369/oracle-setup"
REPO_OWNER = "Fadil369"
REPO_NAME = "oracle-setup"
REPO_BRANCH = "main"

[[services]]
binding = "SCANNER_SERVICE"
service = "oracle-claim-scanner"
