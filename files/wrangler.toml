name = "oracle-claim-scanner"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

account_id = "519d80ce438f427d096a3e3bdd98a7e0"

# ── Browser Rendering binding ─────────────────────────────────────────────────
# This is the core — gives the Worker a real Chromium browser
[[browser]]
binding = "BROWSER"

# ── KV: session storage (Oracle cookies, 8h TTL) ──────────────────────────────
[[kv_namespaces]]
binding  = "SESSIONS"
id       = "REPLACE_WITH_KV_ID_AFTER_wrangler_kv_create"
# Create with: wrangler kv namespace create "ORACLE_SESSIONS"

# ── KV: scan results (24h TTL) ────────────────────────────────────────────────
[[kv_namespaces]]
binding  = "RESULTS"
id       = "REPLACE_WITH_KV_ID_AFTER_wrangler_kv_create"
# Create with: wrangler kv namespace create "ORACLE_RESULTS"

# ── Environment variables ─────────────────────────────────────────────────────
[vars]
ORACLE_URL = "https://oracle-riyadh.elfadil.com"

# ── Secrets (set with wrangler secret put, NOT in wrangler.toml) ──────────────
# wrangler secret put ORACLE_USER
# wrangler secret put ORACLE_PASS
# These become env.ORACLE_USER and env.ORACLE_PASS inside the Worker

# ── Route (optional — gives it a clean URL on your domain) ────────────────────
# [[routes]]
# pattern = "oracle-scanner.elfadil.com/*"
# zone_name = "elfadil.com"
