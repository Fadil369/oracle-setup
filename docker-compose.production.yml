name: brainsait-platform

services:
  gateway:
    image: caddy:2.8
    init: true
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/edge/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      portals-api:
        condition: service_started
      scanner-api:
        condition: service_started
      grafana:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 256
    tmpfs:
      - /tmp:size=64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - edge
      - platform
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portals-api:
    image: ghcr.io/fadil369/brainsait-portals:latest
    init: true
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    tmpfs:
      - /tmp:size=64m
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - platform
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scanner-api:
    image: ghcr.io/fadil369/oracle-claim-scanner:latest
    init: true
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    tmpfs:
      - /tmp:size=128m
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M
    networks:
      - platform
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.124.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/observability/otelcol.conf:/etc/otelcol-contrib/config.yaml:ro
    expose:
      - "4317"
      - "4318"
      - "8889"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    tmpfs:
      - /tmp:size=64m
    networks:
      - observability
      - platform
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    networks:
      - observability
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:3.4.3
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/observability/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    expose:
      - "3100"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    networks:
      - observability
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.4.3
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./infra/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    networks:
      - observability
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.6.0
    env_file:
      - .env.production
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - promtail
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    networks:
      - observability
      - edge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edge:
    driver: bridge
  platform:
    driver: bridge
    internal: true
  observability:
    driver: bridge
    internal: true

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  loki_data:
  grafana_data:
