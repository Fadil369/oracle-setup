name: Sandbox Quality Gate

on:
  workflow_dispatch:
    inputs:
      check:
        description: 'Which check to run'
        required: false
        default: 'all'
        type: choice
        options: [all, lint, test, audit]
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'infra-v3/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc.cjs'
      - 'eslint.config.mjs'

# Only one sandbox run per ref at a time
concurrency:
  group: sandbox-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Isolated quality checks inside a clean container (no local state pollution)
  # ──────────────────────────────────────────────────────────────────────────
  isolated-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: node:20-alpine
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use a pristine npm cache inside the container image — no host cache bleed
      - name: Configure npm
        run: npm config set cache /tmp/.npm-cache

      - name: Install dependencies (clean install)
        run: npm ci

      - name: ESLint
        id: lint
        run: npm run lint

      - name: Run tests
        id: test
        run: npm test

      - name: Dependency audit
        id: audit
        run: npm audit --omit=dev

      # Post a summary comment on PRs
      - name: Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { context } = github;
            const { job } = context;
            const conclusion = '${{ job.status }}' === 'success' ? '✅ passed' : '❌ failed';
            const body = [
              '### 🔬 Sandbox Quality Gate — ' + conclusion,
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| ESLint | `${{ steps.lint.conclusion || job.status }}` |',
              '| Tests  | `${{ steps.test.conclusion || job.status }}` |',
              '| Audit  | `${{ steps.audit.conclusion || job.status }}` |',
              '',
              '*Run was isolated inside a fresh Node 20 Alpine container — no host state.*',
            ].join('\n');
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  # ──────────────────────────────────────────────────────────────────────────
  # (Optional) MCP sandbox run — uses Cloudflare containers.mcp.cloudflare.com
  # Activated only when CLOUDFLARE_MCP_TOKEN secret is configured.
  # ──────────────────────────────────────────────────────────────────────────
  mcp-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run when the org/repo secret is configured and a PR is opened
    if: >
      github.event_name == 'pull_request' &&
      vars.ENABLE_MCP_SANDBOX == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint via MCP sandbox
        env:
          MCP_SANDBOX_URL: https://containers.mcp.cloudflare.com/mcp
          # The token is injected by mcp-remote after the first OAuth flow.
          # In CI, provide the bearer token directly via this env var so that
          # mcp-remote skips the browser-based OAuth step.
          MCP_REMOTE_TOKEN: ${{ secrets.CLOUDFLARE_MCP_TOKEN }}
        run: node scripts/sandbox-quality.mjs --check ${{ inputs.check || 'all' }}
