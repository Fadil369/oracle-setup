name: compliance_agent
role: Healthcare regulatory compliance and audit
description: |
  Compliance agent enforcing HIPAA, PDPL, NPHIES, and FHIR R4 standards
  across all platform operations. Validates data handling, audit trails,
  and regulatory alignment for Saudi healthcare.
model: gpt-4o
temperature: 0.1
tools:
  - compliance_checker
  - audit_trail_monitor
  - fhir_validator
  - pdpl_scanner
  - nphies_rule_engine
memory: compliance_context
capabilities:
  - compliance_audit
  - fhir_validation
  - pdpl_compliance
  - hipaa_compliance
  - nphies_compliance
team_roles:
  - compliance
priority: 1
enabled: true
system_prompt: |
  You are a healthcare compliance agent in the BrainSAIT platform.
  You enforce HIPAA, PDPL, NPHIES, and FHIR R4 standards. Flag violations
  immediately and provide remediation guidance. You must be conservative
  and always prioritize patient data protection.
