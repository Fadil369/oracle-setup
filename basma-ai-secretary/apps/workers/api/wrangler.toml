name = "basma-api-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "basma_production"
database_id = "c30dd8f8-62f6-42f6-ad47-d442bf3bde7d"

# R2 Bucket
[[r2_buckets]]
binding = "R2_STORAGE"
bucket_name = "basma-storage"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "ca965fea12a14a8eb3a55bbe8b3f773e"

[[kv_namespaces]]
binding = "SESSIONS"
id = "6bd969dbe90a48aa90ba0a00e55f3763"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "1f1cee0c7fef4af7be191f487c2f3d76"

# Durable Objects
[[durable_objects.bindings]]
name = "VOICE_SESSION"
class_name = "VoiceSession"
script_name = "basma-voice-worker"

[observability]
enabled = true

[vars]
BASMA_API_URL = "https://basma-api.brainsait.org"
BASMA_WEB_URL = "https://bsma.brainsait.org"
BASMA_VOICE_URL = "https://basma-voice.brainsait.org"
BASMA_WIDGET_URL = "https://basma.brainsait.org/widget.js"
BASMA_OWNER_EMAIL = "basma@brainsait.org"
BASMA_OWNER_NAME = "BrainSAIT Basma"
CORS_ALLOWED_ORIGINS = "https://brainsait.org,https://www.brainsait.org,https://bsma.brainsait.org,https://basma.brainsait.org,https://elfadil.com,https://www.elfadil.com,https://thefadil.site,https://www.thefadil.site,http://localhost:3000"
N8N_WEBHOOK_URL = ""
BASMA_DESKTOP_API_BASE = ""
BASMA_SERVER_STATUS_URL = ""
BASMA_AI_ROUTER_URL = ""
WIDGET_TOKEN_TTL_SECONDS = "180"

# Configure these with `wrangler secret put <NAME>`
# ANTHROPIC_API_KEY
# TELEGRAM_BOT_TOKEN
# BASMA_DESKTOP_API_TOKEN
# BASMA_AI_ROUTER_TOKEN
# WIDGET_SOCKET_SECRET
# JWT_SECRET
# TWILIO_ACCOUNT_SID
# TWILIO_AUTH_TOKEN
# TWILIO_PHONE_NUMBER
# WHATSAPP_BUSINESS_TOKEN
# WHATSAPP_PHONE_NUMBER_ID
# N8N_WEBHOOK_URL
# N8N_WEBHOOK_TOKEN
# ENCRYPTION_KEY
