name = "basma-voice-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "basma_production"
database_id = "c30dd8f8-62f6-42f6-ad47-d442bf3bde7d"

# R2 Bucket
[[r2_buckets]]
binding = "R2_STORAGE"
bucket_name = "basma-storage"

# Durable Objects
[[durable_objects.bindings]]
name = "VOICE_SESSION"
class_name = "VoiceSession"

[[migrations]]
tag = "v1"
new_classes = ["VoiceSession"]

[observability]
enabled = true

[vars]
WIDGET_ALLOWED_ORIGINS = "elfadil.com,www.elfadil.com,thefadil.site,www.thefadil.site,brainsait.org,www.brainsait.org,bsma.brainsait.org,basma.brainsait.org,localhost"

# Configure these with `wrangler secret put <NAME>`
# ANTHROPIC_API_KEY
# N8N_WEBHOOK_URL
# N8N_WEBHOOK_TOKEN
# WIDGET_SOCKET_SECRET

[ai]
binding = "AI"

[[vectorize]]
binding = "BASMA_MEMORY_VECTOR"
index_name = "basma-memory-index"
